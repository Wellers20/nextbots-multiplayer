<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Ловец ошибок для Android WebView
      window.onerror = function(message, source, lineno, colno, error) {
        var errDiv = document.createElement('div');
        errDiv.style.cssText = 'color:red; background:white; padding:20px; position:absolute; top:0; left:0; right:0; z-index:9999; font-size:14px; word-wrap:break-word; border-bottom: 2px solid red;';
        errDiv.innerHTML = '<b>JS Error:</b> ' + message + '<br><b>Line:</b> ' + lineno;
        if (document.body) document.body.appendChild(errDiv);
        return false;
      };
      window.addEventListener('unhandledrejection', function(event) {
        var errDiv = document.createElement('div');
        errDiv.style.cssText = 'color:red; background:white; padding:20px; position:absolute; top:100px; left:0; right:0; z-index:9999; font-size:14px; word-wrap:break-word; border-bottom: 2px solid red;';
        errDiv.innerHTML = '<b>Promise Error:</b> ' + (event.reason && event.reason.message ? event.reason.message : event.reason);
        if (document.body) document.body.appendChild(errDiv);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
